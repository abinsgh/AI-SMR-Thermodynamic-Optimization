<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* إعدادات الصفحة لتكون شفافة وفي المنتصف */
        body {
            background-color: transparent;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center; /* توسيط أفقي */
            align-items: center;     /* توسيط عمودي */
            font-family: sans-serif;
            overflow: visible; /* مهم لكي لا تختفي الأسماء عند الخروج */
        }

        /* --- CSS Code From Uiverse.io by akshat-patel28 --- */
        .tooltip-container {
          position: relative;
          background: #f80254; /* لون الزر الأساسي (أحمر وردي) */
          cursor: pointer;
          transition: all 0.2s;
          font-size: 17px;
          padding: 14px 26px;
          border-radius: 5px;
          text-align: center;
          box-shadow: 1px 2px 3px rgba(0, 0, 0, 0.62),
            inset 0px -2px 3px rgba(0, 0, 0, 0.48), inset 1px 1px 4px #ffffff,
            rgba(50, 50, 93, 0.25) 0px 13px 27px -5px,
            rgba(0, 0, 0, 0.3) 0px 8px 16px -8px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: 800;
          color: #fff;
          z-index: 10;
        }

        .tooltip-1,
        .tooltip-2,
        .tooltip-3 {
          position: absolute;
          transform: translateX(-50%); /* للمحاذاة */
          font-weight: 800;
          opacity: 0;
          pointer-events: none;
          transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); /* حركة نطاطة */
          border-radius: 8px;
          background: #ffdb0f; /* لون التلميح (أصفر) */
          box-shadow: 1px 2px 3px rgba(0, 0, 0, 0.62),
            inset 0px -2px 3px rgba(0, 0, 0, 0.48), inset 1px 1px 4px #ffffff,
            rgba(50, 50, 93, 0.25) 0px 13px 27px -5px,
            rgba(0, 0, 0, 0.3) 0px 8px 16px -8px;
          min-width: 160px; /* عرض الاسم */
          padding: 8px;
          color: #ac0039; /* لون النص */
          font-size: 13px;
          white-space: nowrap;
          z-index: 1;
        }

        /* تعديلات المواقع */
        .tooltip-1 {
          top: 0%;
          left: 50%;
        }
        
        /* فيصل (يسار) */
        .tooltip-2 {
          top: 20%; /* وزنية بسيطة */
          left: 50%; /* يبدأ من المنتصف */
        }

        /* أحمد الصلاحي (يمين) */
        .tooltip-3 {
          top: 20%;
          left: 50%;
        }

        /* --- تأثير الهوفر (الحركة) --- */
        
        /* 1. أحمد الغامدي (يطلع فوق) */
        .tooltip-container:hover .tooltip-1 {
          top: -140%; /* رفعناه أكثر عشان يبان */
          opacity: 1;
          visibility: visible;
        }

        /* 2. فيصل باهادي (يروح يسار) */
        .tooltip-container:hover .tooltip-2 {
          left: -110%; /* يروح يسار */
          opacity: 1;
          visibility: visible;
        }

        /* 3. أحمد الصلاحي (يروح يمين) */
        .tooltip-container:hover .tooltip-3 {
          left: 210%; /* يروح يمين */
          opacity: 1;
          visibility: visible;
        }

    </style>
</head>
<body>

    <div class="tooltip-container">
      
      <span class="tooltip-1">Ahmed Saeed Alghamdi</span>
      
      <span class="tooltip-2">Faisal Saeed Bahadi</span>
      
      <span class="tooltip-3">Ahmed Saud Al-Salahi</span>
      
      <span>Team Members</span>
      
    </div>

</body>
</html>
