<!DOCTYPE html>
<html>
<head>
    <style>
        /* إعدادات الخلفية الشفافة للماتلاب */
        body {
            background-color: transparent;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* --- CSS الذي أرسلته (بدون تعديل جوهري) --- */
        /* From Uiverse.io by dexter-st */ 
        .btn-wrapper {
          position: relative;
          display: inline-block;
        }

        .btn {
          --border-radius: 24px;
          --padding: 4px;
          --transition: 0.4s;
          --button-color: #101010; 
          --highlight-color-hue: 210deg; /* لون أزرق سماوي */

          user-select: none;
          display: flex;
          justify-content: center;
          align-items: center; /* توسيط عمودي */
         padding: 0.5em 1.5em; /* قللنا الارتفاع العلوي والسفلي */
          font-family: "Poppins", "Inter", "Segoe UI", sans-serif;
          font-size: 16px; /* حجم خط مناسب */
          font-weight: 600;

          background-color: var(--button-color);

          box-shadow:
            inset 0px 1px 1px rgba(255, 255, 255, 0.2),
            inset 0px 2px 2px rgba(255, 255, 255, 0.15),
            inset 0px 4px 4px rgba(255, 255, 255, 0.1),
            inset 0px 8px 8px rgba(255, 255, 255, 0.05),
            inset 0px 16px 16px rgba(255, 255, 255, 0.05),
            0px -1px 1px rgba(0, 0, 0, 0.02),
            0px -2px 2px rgba(0, 0, 0, 0.03),
            0px -4px 4px rgba(0, 0, 0, 0.05),
            0px -8px 8px rgba(0, 0, 0, 0.06),
            0px -16px 16px rgba(0, 0, 0, 0.08);

          border: solid 1px #fff2;
          border-radius: var(--border-radius);
          cursor: pointer;
          color: white; /* لون النص */

          transition:
            box-shadow var(--transition),
            border var(--transition),
            background-color var(--transition);
        }

        /* بقية تأثيرات التوهج والخلفية */
        .btn::before {
          content: "";
          position: absolute;
          top: calc(0px - var(--padding));
          left: calc(0px - var(--padding));
          width: calc(100% + var(--padding) * 2);
          height: calc(100% + var(--padding) * 2);
          border-radius: calc(var(--border-radius) + var(--padding));
          pointer-events: none;
          background-image: linear-gradient(0deg, #0004, #000a);
          z-index: -1;
          transition: box-shadow var(--transition), filter var(--transition);
          box-shadow:
            0 -8px 8px -6px #0000 inset,
            0 -16px 16px -8px #00000000 inset,
            1px 1px 1px #fff2,
            2px 2px 2px #fff1,
            -1px -1px 1px #0002,
            -2px -2px 2px #0001;
        }

        .btn::after {
          content: "";
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          border-radius: inherit;
          pointer-events: none;
          background-image: linear-gradient(
            0deg,
            #fff,
            hsl(var(--highlight-color-hue), 100%, 70%),
            hsla(var(--highlight-color-hue), 100%, 70%, 50%),
            8%,
            transparent
          );
          background-position: 0 0;
          opacity: 0;
          transition: opacity var(--transition), filter var(--transition);
        }

        /* تنسيق الحروف للأنيميشن */
        .btn-letter {
          position: relative;
          display: inline-block;
          color: #fff5;
          animation: letter-anim 2s ease-in-out infinite;
          transition: color var(--transition), text-shadow var(--transition), opacity var(--transition);
        }

        @keyframes letter-anim {
          50% { text-shadow: 0 0 3px #fff8; color: #fff; }
        }

        /* أيقونة النجوم */
        .btn-svg {
          flex-grow: 1;
          height: 24px;
          width: 24px;
          margin-right: 0.5rem;
          fill: #e8e8e8;
          animation: flicker 2s linear infinite;
          animation-delay: 0.5s;
          filter: drop-shadow(0 0 2px #fff9);
          transition: fill var(--transition), filter var(--transition), opacity var(--transition);
        }
        @keyframes flicker { 50% { opacity: 0.3; } }

        /* حاوية النص */
        .txt-wrapper {
          position: relative;
          display: flex;
          align-items: center;
        }
        
        /* التأخير الزمني للحروف (مهم جداً للحركة) */
        .btn-letter:nth-child(1) { animation-delay: 0s; }
        .btn-letter:nth-child(2) { animation-delay: 0.08s; }
        .btn-letter:nth-child(3) { animation-delay: 0.16s; }
        .btn-letter:nth-child(4) { animation-delay: 0.24s; }
        .btn-letter:nth-child(5) { animation-delay: 0.32s; }
        .btn-letter:nth-child(6) { animation-delay: 0.40s; }
        .btn-letter:nth-child(7) { animation-delay: 0.48s; }
        .btn-letter:nth-child(8) { animation-delay: 0.56s; }
        .btn-letter:nth-child(9) { animation-delay: 0.64s; }
        .btn-letter:nth-child(10) { animation-delay: 0.72s; }
        .btn-letter:nth-child(11) { animation-delay: 0.80s; }
        .btn-letter:nth-child(12) { animation-delay: 0.88s; }
        .btn-letter:nth-child(13) { animation-delay: 0.96s; }
        .btn-letter:nth-child(14) { animation-delay: 1.04s; }

        /* تأثيرات الهوفر والتركيز */
        .btn:hover { border: solid 1px hsla(var(--highlight-color-hue), 100%, 80%, 40%); }
        .btn:hover::after { opacity: 1; mask-image: linear-gradient(0deg, #fff, transparent); }
        .btn:hover .btn-svg { fill: #fff; filter: drop-shadow(0 0 3px hsl(var(--highlight-color-hue), 100%, 70%)) drop-shadow(0 -4px 6px #0009); animation: none; }
        
        .btn:active { background-color: hsla(var(--highlight-color-hue), 50%, 20%, 0.5); transform: translateY(2px); }

    </style>
</head>
<body>

    <div class="btn-wrapper">
        <button class="btn" onclick="sendToMatlab()">
            
            <svg class="btn-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 21.035l3-3.203 3 3.203-.98-5.355 4.316-3.414-5.066-.307-2.27-5.96-2.27 5.96-5.066.307 4.316 3.414-.98 5.355zm-6.5-12.035l1.5 1.602 1.5-1.602-.49-2.677 2.158-1.707-2.533-.154-1.135-2.98-1.135 2.98-2.533.154 2.158 1.707-.49 2.677zm19 0l1.5 1.602 1.5-1.602-.49-2.677 2.158-1.707-2.533-.154-1.135-2.98-1.135 2.98-2.533.154 2.158 1.707-.49 2.677z"/>
            </svg>

            <div class="txt-wrapper">
                <div class="txt-1">
                    <span class="btn-letter">S</span>
                    <span class="btn-letter">t</span>
                    <span class="btn-letter">a</span>
                    <span class="btn-letter">r</span>
                    <span class="btn-letter">t</span>
                    <span>&nbsp;</span> <span class="btn-letter">A</span>
                    <span class="btn-letter">n</span>
                    <span class="btn-letter">a</span>
                    <span class="btn-letter">l</span>
                    <span class="btn-letter">y</span>
                    <span class="btn-letter">s</span>
                    <span class="btn-letter">i</span>
                    <span class="btn-letter">s</span>
                </div>
            </div>
        </button>
    </div>

    <script type="text/javascript">
        function setup(htmlComponent) {
            window.htmlComponent = htmlComponent;
        }

        function sendToMatlab() {
            if (window.htmlComponent) {
                // نرسل أمر "Analyze" للماتلاب
                window.htmlComponent.Data = "Analyze";
                
                // نصفر البيانات بعد فترة قصيرة للسماح بالضغط مرة أخرى
                setTimeout(function(){
                    window.htmlComponent.Data = "";
                }, 500);
            }
        }
    </script>

</body>
</html>
