<!DOCTYPE html>
<html>
<head>
    <style>
        /* 1. تنسيق الصفحة: نستخدم الصورة المقصوصة كخلفية */
        body {
            /* بدلاً من transparent، نضع صورة الخلفية المقصوصة */
            background-image: url('InputBG.png'); 
            background-size: cover;      /* تغطية كامل المساحة */
            background-position: center; /* توسيط الخلفية */
            background-repeat: no-repeat;
            
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* ---------------------------------------------------- */
        /* 2. كود CSS الخاص بحقل الإدخال (كما هو) */
        /* ---------------------------------------------------- */
        
        /* From Uiverse.io by Christian-putra30 */
        .input {
            border: none;
            outline: none;
            border-radius: 100px;
            padding: 1em;
            background-color: #e1e2e3;
            box-shadow: inset 2px 5px 10px rgba(0, 0, 0, 0.3);
            transition: 300ms ease-in-out;
            
            /* إضافات لتحسين الشكل داخل الماتلاب */
            width: 80%; 
            text-align: center; 
            font-weight: bold;
            color: #333;
        }

        .input:focus {
            background-color: #ffffff;
            transform: scale(1.05);
            /* قللت الظل الخارجي قليلاً لكي لا يخرج عن حدود الصورة */
            box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <input
        placeholder="Generations (e.g. 30)"
        class="input"
        name="text"
        autocomplete="off"
        type="number" 
        oninput="sendToMatlab(this.value)"
    />

    <script type="text/javascript">
        function setup(htmlComponent) {
            window.htmlComponent = htmlComponent;
        }

        function sendToMatlab(val) {
            // إرسال الرقم المكتوب حالياً إلى ماتلاب
            if (window.htmlComponent) {
                window.htmlComponent.Data = val;
            }
        }
    </script>
</body>
</html>
